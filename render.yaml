# ── Render Blueprint (Infrastructure-as-Code) ───
# Deploy: Connect this repo to Render → it reads this file automatically

databases:
  - name: zentara-db
    plan: free
    databaseName: zentara
    user: zentara

services:
  - type: web
    name: zentara
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn wsgi:app -c gunicorn.conf.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zentara-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: AI_PROVIDER
        value: claude
      - key: CLAUDE_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
    healthCheckPath: /health
    autoDeploy: true
